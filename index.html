<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The True Poki</title>

<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">

<style>
body {
    background-color: #0b0b0f;
    margin: 0;
    font-family: Arial, sans-serif;
}

/* Logo */
.site-logo {
    position: absolute;
    top: 15px;
    left: 20px;
    font-family: 'Luckiest Guy', cursive;
    font-size: 30px;
    color: #1e90ff;
    text-shadow: 2px 2px 0px #000;
}

/* Grid layout */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 30px;
    padding: 120px 40px;
    justify-items: center;
}

/* Game cards */
.game-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 20px;
    width: 180px;
    background-color: #111;
    border: 2px solid #555;
    border-radius: 12px;
    color: white;
    cursor: pointer;
    transition: 0.3s;
    text-decoration: none;
}

.game-card:hover {
    transform: scale(1.08);
    background-color: #222;
}

.game-card img {
    width: 120px;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="site-logo">the true poki!</div>

<div class="container">

    <!-- Hollow Knight -->
    <a class="game-card" href="hollow.html">
        <img src="https://cdn.cloudflare.steamstatic.com/steam/apps/367520/header.jpg" alt="Hollow Knight">
        <span>Hollow Knight</span>
    </a>

    <!-- Karlson -->
    <a class="game-card" href="karlson.html">
        <img src="https://cdn.cloudflare.steamstatic.com/steam/apps/1228610/header.jpg" alt="Karlson">
        <span>Karlson</span>
    </a>

</div>

</body>
</html>
