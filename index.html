<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <title>The True Poki</title> <!-- Cartoony Font --> <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet"> <style> body { background-color: #0b0b0f; font-family: Arial, sans-serif; margin: 0; height: 100vh; } /* Top-left site logo */ .site-logo { position: absolute; top: 15px; left: 20px; font-family: 'Luckiest Guy', cursive; font-size: 30px; color: #1e90ff; text-shadow: 2px 2px 0px #000; } /* Center container */ .container { display: flex; justify-content: center; align-items: center; height: 100%; } /* Game button */ .game-button { display: flex; flex-direction: column; /* STACK image + text */ align-items: center; gap: 10px; padding: 20px; font-size: 20px; background-color: #111; color: white; border: 2px solid #555; border-radius: 12px; cursor: pointer; transition: 0.3s; width: 180px; } .game-button:hover { background-color: #222; transform: scale(1.08); } .game-button img { width: 120px; height: auto; border-radius: 8px; } </style> </head> <body> <!-- Top Left Logo --> <div class="site-logo">the true poki!</div> <!-- Center Button --> <div class="container"> <button class="game-button" onclick="openHollowKnight()"> <img src="https://cdn.cloudflare.steamstatic.com/steam/apps/367520/header.jpg" alt="Hollow Knight Logo"> <span>Hollow Knight</span> </button> </div> <script> function openHollowKnight() { window.open("https://example.com/hollow-knight", "_blank"); } </script> </body> </html>
